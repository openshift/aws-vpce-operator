apiVersion: v1
kind: Template
metadata:
  name: fr-high-template

parameters:
  - name: PKO_IMAGE
    required: true
  - name: OPERATOR_IMAGE
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE_DIGEST
    required: false
  - name: REPO_NAME
    value: aws-vpce-operator
    required: true
  - name: DISPLAY_NAME
    value: AWS VPCE Operator
    required: true
  - name: NAMESPACE
    value: openshift-aws-vpce-operator

objects:
  - apiVersion: package-operator.run/v1alpha1
    kind: ClusterPackage
    metadata:
      name: ${REPO_NAME}
      annotations:
        package-operator.run/collision-protection: IfNoController
    spec:
      image: ${PKO_IMAGE}:${IMAGE_TAG}
      config:
        image: ${OPERATOR_IMAGE}:${IMAGE_TAG}
