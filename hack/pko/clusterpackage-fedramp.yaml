apiVersion: v1
kind: Template
metadata:
  name: selectorsyncset-template

parameters:
- name: CHANNEL
  required: false
- name: IMAGE_TAG
  required: true
- name: IMAGE_DIGEST
  required: false
- name: REPO_NAME
  value: aws-vpce-operator
  required: true
- name: DISPLAY_NAME
  value: AWS VPCE Operator
  required: true
- name: PKO_IMAGE
  required: true
- name: OPERATOR_IMAGE
  required: true

objects:
###############
# FedRAMP SSS #
###############
- apiVersion: hive.openshift.io/v1
  kind: SelectorSyncSet
  metadata:
    annotations:
      component-display-name: ${DISPLAY_NAME}
      component-name: ${REPO_NAME}
      telemeter-query: csv_succeeded{_id="$CLUSTER_ID",name=~"${REPO_NAME}.*",exported_namespace=~"openshift-.*",namespace="openshift-operator-lifecycle-manager"} == 1
    labels:
      managed.openshift.io/gitHash: ${IMAGE_TAG}
      managed.openshift.io/gitRepoName: ${REPO_NAME}
      managed.openshift.io/osd: 'true'
    name: aws-vpce-operator-pko
  spec:
    clusterDeploymentSelector:
      matchExpressions:
        - key: api.openshift.com/managed
          operator: In
          values:
            - "true"
        - key: api.openshift.com/fedramp
          operator: In
          values:
            - "true"
        - key: api.openshift.com/private-link
          operator: In
          values:
            - "true"
        - key: ext-managed.openshift.io/hive-shard
          operator: NotIn
          values:
            - "true"
    resourceApplyMode: Sync
    applyBehavior: CreateOrUpdate
    resources:
    - apiVersion: package-operator.run/v1alpha1
      kind: ClusterPackage
      metadata:
        name: "${REPO_NAME}"
        annotations:
          package-operator.run/collision-protection: IfNoController
      spec:
        image: ${PKO_IMAGE}:${IMAGE_TAG}
        config:
          image: ${OPERATOR_IMAGE}:${IMAGE_TAG}

##################
# HyperShift SSS #
##################
- apiVersion: hive.openshift.io/v1
  kind: SelectorSyncSet
  metadata:
    annotations:
      component-display-name: ${DISPLAY_NAME}
      component-name: ${REPO_NAME}
      telemeter-query: csv_succeeded{_id="$CLUSTER_ID",name=~"${REPO_NAME}.*",exported_namespace=~"openshift-.*",namespace="openshift-operator-lifecycle-manager"} == 1
    labels:
      managed.openshift.io/gitHash: ${IMAGE_TAG}
      managed.openshift.io/gitRepoName: ${REPO_NAME}
      managed.openshift.io/osd: 'true'
    name: aws-vpce-operator-hypershift-sss-pko
  spec:
    clusterDeploymentSelector:
      matchExpressions:
        - key: ext-hypershift.openshift.io/cluster-type
          operator: In
          values:
            - "management-cluster"
            - "service-cluster"
        - key: api.openshift.com/fedramp
          operator: NotIn
          values: ["true"]
    resourceApplyMode: Upsert
    applyBehavior: CreateOrUpdate
    resources:
    - apiVersion: package-operator.run/v1alpha1
      kind: ClusterPackage
      metadata:
        name: "${REPO_NAME}"
        annotations:
          package-operator.run/collision-protection: IfNoController
      spec:
        image: ${PKO_IMAGE}:${IMAGE_TAG}
        config:
          image: ${OPERATOR_IMAGE}:${IMAGE_TAG}

  ############################################
  # HyperShift Management Cluster Config SSS #
  ############################################
- apiVersion: hive.openshift.io/v1
  kind: SelectorSyncSet
  metadata:
    annotations:
      component-display-name: ${DISPLAY_NAME}
      component-name: ${REPO_NAME}
      telemeter-query: csv_succeeded{_id="$CLUSTER_ID",name=~"${REPO_NAME}.*",exported_namespace=~"openshift-.*",namespace="openshift-operator-lifecycle-manager"} == 1
    labels:
      managed.openshift.io/gitHash: ${IMAGE_TAG}
      managed.openshift.io/gitRepoName: ${REPO_NAME}
      managed.openshift.io/osd: 'true'
    name: aws-vpce-operator-mc-config-sss-pko
  spec:
    clusterDeploymentSelector:
      matchExpressions:
        - key: ext-hypershift.openshift.io/cluster-type
          operator: In
          values:
            - "management-cluster"
        - key: api.openshift.com/fedramp
          operator: NotIn
          values: ["true"]
    resourceApplyMode: Sync
    applyBehavior: CreateOrUpdate
    resources:
      - kind: ConfigMap
        apiVersion: v1
        metadata:
          name: avo-config
          namespace: openshift-${REPO_NAME}
        data:
          avo_config.yaml: |-
            apiVersion: avo.openshift.io/v1alpha1
            kind: AvoConfig
            enableVpcEndpointController: true
            enableVpcEndpointAcceptanceController: false
            enableVpcEndpointTemplateController: true
