apiVersion: v1
kind: Template
parameters:
  - name: CHANNEL
    required: false
  - name: PKO_IMAGE
    required: true
  - name: OPERATOR_IMAGE
    required: true
  - name: IMAGE_TAG
    required: true
  - name: IMAGE_DIGEST
    required: true
  - name: NAMESPACE
    value: openshift-aws-vpce-operator
  - name: REPO_NAME
    value: aws-vpce-operator
    required: true
metadata:
  name: selectorsyncset-template
objects:
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      labels:
        managed.openshift.io/gitHash: ${IMAGE_TAG}
        managed.openshift.io/gitRepoName: ${REPO_NAME}
        managed.openshift.io/osd: "true"
      name: aws-vpce-operator-stage
    spec:
      clusterDeploymentSelector:
        matchExpressions:
          - key: ext-hypershift.openshift.io/cluster-type
            operator: In
            values:
              - "management-cluster"
              - "service-cluster"
          - key: api.openshift.com/fedramp
            operator: NotIn
            values: ["true"]
      resourceApplyMode: Sync
      resources:
        - apiVersion: package-operator.run/v1alpha1
          kind: ClusterPackage
          metadata:
            name: "${REPO_NAME}"
            annotations:
              package-operator.run/collision-protection: IfNoController
          spec:
            image: ${PKO_IMAGE}:${IMAGE_TAG}
            config:
              image: ${OPERATOR_IMAGE}:${IMAGE_TAG}
  ########################
  # CredentialsRequest SSS
  ########################
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      labels:
        managed.openshift.io/gitHash: ${IMAGE_TAG}
        managed.openshift.io/gitRepoName: ${REPO_NAME}
        managed.openshift.io/osd: "true"
      name: aws-vpce-operator-creds
    spec:
      clusterDeploymentSelector:
        matchExpressions:
          - key: ext-hypershift.openshift.io/cluster-type
            operator: In
            values:
              - "management-cluster"
              - "service-cluster"
          - key: api.openshift.com/fedramp
            operator: NotIn
            values: ["true"]
      resourceApplyMode: Upsert
      applyBehavior: CreateOrUpdate
      resources:
        - apiVersion: cloudcredential.openshift.io/v1
          kind: CredentialsRequest
          metadata:
            name: avo-aws-iam-user-creds
            namespace: openshift-${REPO_NAME}
          spec:
            secretRef:
              name: avo-aws-iam-user-creds
              namespace: openshift-${REPO_NAME}
            providerSpec:
              apiVersion: cloudcredential.openshift.io/v1
              kind: AWSProviderSpec
              statementEntries:
              - effect: Allow
                resource: '*'
                action:
                # VPCEndpoint Controller
                - ec2:CreateTags
                - ec2:DescribeSubnets
                - ec2:CreateSecurityGroup
                - ec2:DeleteSecurityGroup
                - ec2:DescribeSecurityGroups
                - ec2:AuthorizeSecurityGroupIngress
                - ec2:AuthorizeSecurityGroupEgress
                - ec2:DescribeSecurityGroupRules
                - ec2:CreateVpcEndpoint
                - ec2:DeleteVpcEndpoints
                - ec2:DescribeVpcEndpoints
                - ec2:DescribeVpcs
                - ec2:ModifyVpcEndpoint
                - ec2:DescribeVpcEndpointServices
                - route53:ChangeResourceRecordSets
                - route53:ListHostedZonesByVPC
                - route53:ListResourceRecordSets
                - route53:ListTagsForResource
                - route53:GetHostedZone
                - route53:CreateHostedZone
                - route53:DeleteHostedZone
                - route53:ChangeTagsForResource
                - route53:CreateVpcAssociationAuthorization
                # VPCEndpointAcceptance Controller
                - sts:AssumeRole
                - ec2:DescribeVpcEndpointConnections
                - ec2:AcceptVpcEndpointConnections
  ############################################
  # HyperShift Management Cluster Config SSS #
  ############################################
  - apiVersion: hive.openshift.io/v1
    kind: SelectorSyncSet
    metadata:
      labels:
        managed.openshift.io/gitHash: ${IMAGE_TAG}
        managed.openshift.io/gitRepoName: ${REPO_NAME}
        managed.openshift.io/osd: "true"
      name: aws-vpce-operator-mc-config
    spec:
      clusterDeploymentSelector:
        matchExpressions:
          - key: ext-hypershift.openshift.io/cluster-type
            operator: In
            values:
              - "management-cluster"
          - key: api.openshift.com/fedramp
            operator: NotIn
            values: ["true"]
      resourceApplyMode: Sync
      applyBehavior: CreateOrUpdate
      resources:
        - kind: ConfigMap
          apiVersion: v1
          metadata:
            name: avo-config
            namespace: openshift-aws-vpce-operator
          data:
            avo_config.yaml: |-
              apiVersion: avo.openshift.io/v1alpha1
              kind: AvoConfig
              enableVpcEndpointController: true
              enableVpcEndpointAcceptanceController: false
              enableVpcEndpointTemplateController: true
